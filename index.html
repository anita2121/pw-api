<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>User Management Dashboard</title>

<style>
:root{
--bg:#0f172a;
--card:rgba(255,255,255,.08);
--border:rgba(255,255,255,.12);
--primary:#7c3aed;
--secondary:#06b6d4;
--text:#fff;
--muted:#94a3b8;
--danger:#ef4444;
--radius:20px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,system-ui;
}

body{
background:
radial-gradient(circle at top left,#7c3aed 0%,transparent 30%),
radial-gradient(circle at bottom right,#06b6d4 0%,transparent 30%),
var(--bg);

color:var(--text);
min-height:100vh;
padding:30px;
}

.container{
display:grid;
grid-template-columns:350px 1fr;
gap:24px;
}

@media(max-width:900px){
.container{
grid-template-columns:1fr;
}
}

.card{
background:var(--card);
backdrop-filter:blur(14px);
border:1px solid var(--border);
border-radius:var(--radius);
padding:24px;
}

h2{
margin-bottom:20px;
}

.input{
width:100%;
padding:14px;
margin-bottom:14px;

background:rgba(255,255,255,.06);
border:1px solid var(--border);

color:white;
border-radius:12px;
}

.input:focus{
outline:none;
border-color:var(--secondary);
}

.btn{
border:none;
cursor:pointer;

padding:14px;

width:100%;
border-radius:12px;

font-weight:600;

transition:.25s;
}

.primary{
background:linear-gradient(
90deg,
var(--primary),
var(--secondary)
);

color:white;
}

.primary:hover{
transform:translateY(-2px);
}

.cancel{
background:transparent;
color:#cbd5e1;
margin-top:10px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;

margin-bottom:20px;
}

.stat{
padding:18px;

border-radius:16px;

background:rgba(255,255,255,.05);
}

.stat small{
color:var(--muted);
}

.stat h1{
margin-top:6px;
}

.toolbar{
display:flex;
justify-content:space-between;

margin-bottom:20px;
gap:10px;
}

.search{
flex:1;
}

table{
width:100%;
border-collapse:collapse;
}

th{
text-align:left;
padding:14px;

color:var(--muted);
}

td{
padding:16px 14px;

border-top:1px solid rgba(255,255,255,.08);
}

tr:hover{
background:rgba(255,255,255,.04);
}

.role{
padding:8px 12px;

border-radius:999px;

font-size:13px;
}

.admin{
background:#4c1d95;
}

.user{
background:#064e3b;
}

.actions{
display:flex;
gap:8px;
}

.small{
padding:8px 12px;
width:auto;
}

.edit{
background:#06b6d4;
}

.delete{
background:var(--danger);
}

.empty{
padding:40px;
text-align:center;
color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h2 id="title">Tambah User</h2>

<form id="form">

<input type="hidden" id="id">

<input
class="input"
id="username"
placeholder="Username"
required
>

<input
class="input"
type="email"
id="email"
placeholder="Email"
required
>

<select
id="role"
class="input"
>
<option>User</option>
<option>Admin</option>
</select>

<button class="btn primary">
Simpan
</button>

<button
type="button"
class="btn cancel"
id="cancel"
style="display:none"
>
Batal
</button>

</form>

</div>


<div>

<div class="stats">

<div class="stat">
<small>Total User</small>
<h1 id="total">0</h1>
</div>

<div class="stat">
<small>Admin</small>
<h1 id="admins">0</h1>
</div>

<div class="stat">
<small>User</small>
<h1 id="users">0</h1>
</div>

</div>


<div class="card">

<div class="toolbar">

<h2>Dashboard User</h2>

<input
class="input search"
id="search"
placeholder="Cari user..."
>

</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Username</th>
<th>Email</th>
<th>Role</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

</div>


<script>

const Store={

KEY:"modern_users",

async get(){

let data=localStorage.getItem(this.KEY)

if(!data){

const res=await fetch("users.json")

data=await res.json()

localStorage.setItem(
this.KEY,
JSON.stringify(data)
)

return data
}

return JSON.parse(data)

},

save(data){
localStorage.setItem(
this.KEY,
JSON.stringify(data)
)
}

}


const UI={

async render(){

const users=
await Store.get()

const keyword=
search.value.toLowerCase()

const filtered=
users.filter(
u=>
u.username
.toLowerCase()
.includes(keyword)
)

tbody.innerHTML=
filtered.length
?
filtered.map(u=>`

<tr>

<td>${u.id}</td>

<td>${u.username}</td>

<td>${u.email}</td>

<td>

<span
class="role ${u.role.toLowerCase()}">
${u.role}
</span>

</td>

<td>

<div class="actions">

<button
class="btn small edit"
onclick="edit(${u.id})">

Edit

</button>

<button
class="btn small delete"
onclick="hapus(${u.id})">

Hapus

</button>

</div>

</td>

</tr>

`).join("")
:
`<tr>
<td colspan=5 class="empty">
Tidak ada data
</td>
</tr>`

total.innerText=
users.length

admins.innerText=
users.filter(
x=>x.role==="Admin"
).length

usersStat=
users.filter(
x=>x.role==="User"
).length

document.getElementById(
"users"
).innerText=
usersStat

}

}

async function submit(e){

e.preventDefault()

let users=
await Store.get()

let obj={

id:
id.value
?
Number(id.value)
:
Date.now(),

username:
username.value,

email:
email.value,

role:
role.value

}

if(id.value){

users=
users.map(
u=>
u.id==obj.id
?
obj
:
u
)

}else{

users.push(obj)

}

Store.save(users)

reset()

UI.render()

}

async function edit(i){

let users=
await Store.get()

let u=
users.find(
x=>x.id===i
)

id.value=u.id
username.value=u.username
email.value=u.email
role.value=u.role

title.innerText=
"Edit User"

cancel.style.display=
"block"

}

async function hapus(i){

if(confirm("Hapus user?")){

let users=
await Store.get()

Store.save(
users.filter(
u=>u.id!==i
)
)

UI.render()

}

}

function reset(){

form.reset()

id.value=""

title.innerText=
"Tambah User"

cancel.style.display=
"none"

}

form.addEventListener(
"submit",
submit
)

cancel.onclick=reset

search.addEventListener(
"input",
UI.render
)

UI.render()

</script>

</body>
</html>
